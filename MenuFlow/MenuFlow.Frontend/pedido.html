<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MenuFlow | Acompanhar Pedido</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="page-header">
    <nav class="navbar">
      <a href="./index.html" class="brand">
        <div class="brand-icon">🍔</div>
        <div>
          <h1>MenuFlow</h1>
          <span>Acompanhar pedido</span>
        </div>
      </a>

      <a href="./index.html" class="cart-button">
        ←
        <span>Voltar ao cardápio</span>
      </a>
    </nav>
  </header>

  <main class="order-page">
    <section class="order-container">
      <div class="section-title">
        <div>
          <span class="section-kicker">Pedido</span>
          <h2>Acompanhe seus pedidos</h2>
        </div>
        <p>Digite seu telefone para ver os pedidos ativos das últimas 24 horas.</p>
      </div>

      <div class="order-search-card">
        <div class="form-group">
          <label for="telefoneInput">Telefone usado no pedido</label>
          <div class="order-search-row">
            <input type="text" id="telefoneInput" placeholder="Ex: 84999999999" />
            <button id="buscarPedidosButton" class="checkout-button">Buscar</button>
          </div>
        </div>

        <p id="pedido-error" class="checkout-error hidden"></p>
      </div>

      <div id="pedido-loading" class="loading hidden">
        Carregando pedidos...
      </div>

      <div id="pedidos-content" class="orders-track-list hidden"></div>

      <div id="pedidos-empty" class="empty-state hidden">
        <div>📦</div>
        <h3>Nenhum pedido ativo encontrado</h3>
        <p>Confira o telefone informado ou aguarde alguns instantes após finalizar o pedido.</p>
      </div>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/pedido.js"></script>
</body>
</html>
