<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MenuFlow | Checkout</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="page-header">
    <nav class="navbar">
      <a href="./index.html" class="brand">
        <div class="brand-icon">🍔</div>
        <div>
          <h1>MenuFlow</h1>
          <span>Finalizar pedido</span>
        </div>
      </a>

      <a href="./carrinho.html" class="cart-button">
        ←
        <span>Voltar ao carrinho</span>
      </a>
    </nav>
  </header>

  <main class="checkout-page">
    <section class="checkout-container">
      <div class="section-title">
        <div>
          <span class="section-kicker">Checkout</span>
          <h2>Finalize seu pedido</h2>
        </div>
        <p>Informe seus dados para concluir o pedido.</p>
      </div>

      <div class="checkout-layout">
        <form id="checkout-form" class="checkout-form">
          <div class="form-card">
            <h3>Dados do cliente</h3>

            <div class="form-group">
              <label for="nomeCliente">Nome completo</label>
              <input type="text" id="nomeCliente" placeholder="Ex: João Silva" required />
            </div>

            <div class="form-group">
              <label for="telefoneCliente">Telefone</label>
              <input type="text" id="telefoneCliente" placeholder="Ex: 84999999999" required />
            </div>

            <div class="form-group">
              <label for="enderecoEntrega">Endereço de entrega</label>
              <input type="text" id="enderecoEntrega" placeholder="Rua, número, bairro..." required />
            </div>

            <div class="form-group">
              <label for="observacao">Observação</label>
              <textarea id="observacao" rows="4" placeholder="Ex: Sem cebola, entregar na portaria..."></textarea>
            </div>
          </div>

          <div class="form-card">
            <h3>Forma de pagamento</h3>

            <div class="payment-options">
              <label class="payment-option">
                <input type="radio" name="formaPagamento" value="1" checked />
                <span>Pix</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="formaPagamento" value="2" />
                <span>Dinheiro</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="formaPagamento" value="3" />
                <span>Cartão na entrega</span>
              </label>

              <label class="payment-option">
                <input type="radio" name="formaPagamento" value="4" />
                <span>Cartão online</span>
              </label>
            </div>
          </div>

          <button type="submit" id="finish-order-button" class="checkout-button">
            Confirmar pedido
          </button>

          <p id="checkout-error" class="checkout-error hidden"></p>
        </form>

        <aside class="summary-card">
          <h3>Resumo</h3>

          <div id="checkout-items" class="checkout-items"></div>

          <div class="summary-divider"></div>

          <div class="summary-row">
            <span>Subtotal</span>
            <strong id="checkout-subtotal">R$ 0,00</strong>
          </div>

          <div class="summary-row">
            <span>Taxa de entrega</span>
            <strong id="checkout-delivery-fee">R$ 5,00</strong>
          </div>

          <div class="summary-divider"></div>

          <div class="summary-row total">
            <span>Total</span>
            <strong id="checkout-total">R$ 0,00</strong>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="./js/api.js"></script>
  <script src="./js/carrinho.js"></script>
  <script src="./js/checkout.js"></script>
</body>
</html>
