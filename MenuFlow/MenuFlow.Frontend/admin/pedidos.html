<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MenuFlow | Pedidos Admin</title>

  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="./dashboard.html" class="brand admin-brand">
        <div class="brand-icon">🍔</div>
        <div>
          <h1>MenuFlow</h1>
          <span>Admin</span>
        </div>
      </a>

      <nav class="admin-nav">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./pedidos.html" class="active">Pedidos</a>
        <a href="./produtos.html">Produtos</a>
        <a href="./categorias.html">Categorias</a>
        <a href="../index.html">Ver loja</a>
      </nav>

      <button id="logout-button" class="admin-logout">
        Sair
      </button>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <span class="section-kicker">Administração</span>
          <h2>Pedidos</h2>
        </div>

        <div class="admin-actions">
          <button id="refresh-orders-button" class="admin-action-button">
            Atualizar
          </button>

          <div class="admin-user-card">
            <span id="admin-user-name">Admin</span>
            <small id="admin-user-email">admin@menuflow.com</small>
          </div>
        </div>
      </header>

      <section class="admin-filters-card">
        <div class="form-group">
          <label for="status-filter">Filtrar por status</label>
          <select id="status-filter" class="admin-select">
            <option value="all">Todos</option>
            <option value="1">Recebido</option>
            <option value="2">Em preparo</option>
            <option value="3">Saiu para entrega</option>
            <option value="4">Entregue</option>
            <option value="5">Cancelado</option>
          </select>
        </div>
      </section>

      <section id="orders-loading" class="loading">
        Carregando pedidos...
      </section>

      <section id="orders-list" class="admin-orders-list hidden"></section>

      <div id="orders-empty" class="empty-state hidden">
        <div>📦</div>
        <h3>Nenhum pedido encontrado</h3>
        <p>Quando os clientes fizerem pedidos, eles aparecerão aqui.</p>
      </div>

      <p id="orders-error" class="checkout-error hidden"></p>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="../js/api.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-pedidos.js"></script>
</body>
</html>
