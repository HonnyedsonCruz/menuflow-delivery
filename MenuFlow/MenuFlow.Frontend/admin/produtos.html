<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MenuFlow | Produtos Admin</title>

  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="./dashboard.html" class="brand admin-brand">
        <div class="brand-icon">🍔</div>
        <div>
          <h1>MenuFlow</h1>
          <span>Admin</span>
        </div>
      </a>

      <nav class="admin-nav">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./pedidos.html">Pedidos</a>
        <a href="./produtos.html" class="active">Produtos</a>
        <a href="./categorias.html">Categorias</a>
        <a href="../index.html">Ver loja</a>
      </nav>

      <button id="logout-button" class="admin-logout">
        Sair
      </button>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <span class="section-kicker">Administração</span>
          <h2>Produtos</h2>
        </div>

        <div class="admin-actions">
          <button id="open-product-form-button" class="admin-action-button">
            Novo produto
          </button>

          <div class="admin-user-card">
            <span id="admin-user-name">Admin</span>
            <small id="admin-user-email">admin@menuflow.com</small>
          </div>
        </div>
      </header>

      <section id="product-form-card" class="admin-form-card hidden">
        <div class="admin-panel-header">
          <h3 id="product-form-title">Novo produto</h3>
          <button id="close-product-form-button" class="admin-small-button danger">
            Fechar
          </button>
        </div>

        <form id="product-form" class="admin-product-form">
          <input type="hidden" id="produtoId" />

          <div class="form-grid">
            <div class="form-group">
              <label for="nome">Nome do produto</label>
              <input type="text" id="nome" placeholder="Ex: X-Bacon Artesanal" required />
            </div>

            <div class="form-group">
              <label for="preco">Preço</label>
              <input type="number" id="preco" placeholder="Ex: 29.90" step="0.01" min="0" required />
            </div>

            <div class="form-group full">
              <label for="descricao">Descrição</label>
              <textarea id="descricao" rows="4" placeholder="Descreva o produto..." required></textarea>
            </div>

            <div class="form-group full">
              <label for="imagemUrl">URL da imagem</label>
              <input type="url" id="imagemUrl" placeholder="https://exemplo.com/imagem.jpg" />
            </div>

            <div class="form-group">
              <label for="categoriaId">Categoria</label>
              <select id="categoriaId" class="admin-select" required>
                <option value="">Selecione uma categoria</option>
              </select>
            </div>

            <div class="form-group">
              <label for="disponivel">Disponibilidade</label>
              <select id="disponivel" class="admin-select">
                <option value="true">Disponível</option>
                <option value="false">Indisponível</option>
              </select>
            </div>
          </div>

          <div class="image-preview-card">
            <span>Prévia da imagem</span>
            <div id="image-preview" class="image-preview">
              🍽️
            </div>
          </div>

          <button type="submit" id="save-product-button" class="checkout-button">
            Salvar produto
          </button>

          <p id="product-form-error" class="checkout-error hidden"></p>
        </form>
      </section>

      <section class="admin-filters-card">
        <div class="form-group">
          <label for="product-search">Buscar produto</label>
          <input type="text" id="product-search" placeholder="Digite o nome do produto..." />
        </div>
      </section>

      <section id="products-loading" class="loading">
        Carregando produtos...
      </section>

      <section id="admin-products-grid" class="admin-products-grid hidden"></section>

      <div id="products-empty" class="empty-state hidden">
        <div>🍽️</div>
        <h3>Nenhum produto encontrado</h3>
        <p>Cadastre produtos para que eles apareçam no cardápio.</p>
      </div>

      <p id="products-error" class="checkout-error hidden"></p>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="../js/api.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-produtos.js"></script>
</body>
</html>
